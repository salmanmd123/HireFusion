<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireFusion | Multi-User AI Automator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #1e3c72 0%, transparent 30%),
                radial-gradient(circle at bottom right, #2a5298 0%, transparent 30%),
                linear-gradient(135deg, #0f172a, #111827);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 30px;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            color: white;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.45);
        }

        h4 {
            font-weight: 700;
        }

        /* Form Inputs */
        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #4f9cff;
            box-shadow: 0 0 0 0.2rem rgba(79, 156, 255, 0.25);
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
        }

        small {
            color: rgba(255, 255, 255, 0.65) !important;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: scale(1.02);
        }

        .btn-outline-light {
            border-radius: 10px;
        }

        /* Links */
        a {
            color: #93c5fd;
            transition: 0.3s;
        }

        a:hover {
            color: #ffffff;
        }

        /* Console */
        #status-console {
            background: #0d1117;
            color: #00ff88;
            font-family: 'Courier New', Courier, monospace;
            height: 320px;
            overflow-y: auto;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.15);
        }

        .phase-log {
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
            animation: fadeIn 0.4s ease;
        }

        /* History List */
        .list-group-item {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            margin-bottom: 10px;
            border-radius: 12px !important;
        }

        /* Badge */
        .badge {
            padding: 10px 14px;
            font-size: 0.9rem;
        }

        /* Hidden */
        .hidden {
            display: none;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media(max-width: 768px) {
            .navbar {
                padding: 15px;
            }

            .card {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <span class="navbar-brand text-white"> HireFusion </span>

        <div id="nav-user-info" class="hidden">
            <span id="user-email-display" class="me-3"></span>
            <button id="logout-btn" class="btn btn-outline-light btn-sm">
                Logout
            </button>
        </div>
    </nav>

    <div class="container py-5">

        <!-- Auth Section -->
        <div id="auth-section" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h4 id="auth-title" class="mb-4 text-center">
                        Welcome Back 👋
                    </h4>

                    <form id="auth-form">

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>

                        <div id="reg-fields" class="hidden">

                            <div class="mb-3">
                                <label class="form-label">
                                    Gmail App Password
                                </label>

                                <input type="password"
                                    id="appPassword"
                                    class="form-control"
                                    placeholder="16-digit code">

                                <small>
                                    Generate this from Google Security Settings.
                                </small>
                            </div>

                        </div>

                        <button type="submit"
                            id="auth-submit"
                            class="btn btn-primary w-100 mb-3">
                            Login
                        </button>

                        <a href="#"
                            id="toggle-auth"
                            class="d-block text-center text-decoration-none">
                            Need an account? Register
                        </a>

                    </form>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-section" class="row hidden">

            <!-- Left -->
            <div class="col-md-5">
                <div class="card p-4">
                    <h4 class="mb-4">⚙️ Automation Settings</h4>

                    <form id="automation-form">

                        <div class="mb-3">
                            <label class="form-label">Job Keyword</label>

                            <input type="text"
                                id="keyword"
                                name="keyword"
                                class="form-control"
                                placeholder="e.g. Java Developer"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>

                            <input type="text"
                                id="location"
                                name="location"
                                class="form-control"
                                placeholder="e.g. Remote"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Date Posted</label>

                            <select id="date-posted"
                                name="datePosted"
                                class="form-select">

                                <option value="r86400">
                                    Past 24 Hours
                                </option>

                                <option value="r604800">
                                    Past Week
                                </option>

                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Upload Resume (PDF)
                            </label>

                            <input type="file"
                                id="resume"
                                name="resume"
                                class="form-control"
                                accept=".pdf"
                                required>
                        </div>

                        <button type="submit"
                            class="btn btn-primary w-100 py-2 fw-bold">
                            🚀 Start Auto-Apply
                        </button>

                    </form>
                </div>
            </div>

            <!-- Right -->
            <div class="col-md-7">

                <div class="card p-4 mb-4">

                    <h4 class="mb-3">
                        💻 Live Enrichment Pipeline
                    </h4>

                    <div id="status-console">
                        <div class="phase-log">
                            > System Ready. Waiting for command...
                        </div>
                    </div>

                </div>

                <div class="card p-4">

                    <div class="d-flex justify-content-between align-items-center mb-3">

                        <h4>
                            📄 Your Application History
                        </h4>

                        <span class="badge bg-primary rounded-pill">
                            Total:
                            <span id="total-apps">0</span>
                        </span>

                    </div>

                    <div id="history-list" class="list-group">
                        <p class="text-light text-center py-3">
                            No activity yet.
                        </p>
                    </div>

                </div>

            </div>
        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
